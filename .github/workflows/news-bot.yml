name: News Bot (with Health Monitor)

on:
  schedule:
    # 每3小時執行一次（0,3,6,9,12,15,18,21點 UTC = 8,11,14,17,20,23,02,05點 GMT+8）
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
  workflow_dispatch:
    # 可以手動觸發

permissions:
  contents: write

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://t.me/changyp99_news_bot

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run news bot (broadcast)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python broadcast.py
      
      - name: Quick health check (light)
        run: |
          python self_healer.py --light || echo "Health check failed"
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Commit updated history
        run: |
          git config --local user.email "news-bot@github.com"
          git config --local user.name "News Bot"
          git add sent_history.json 2>/dev/null || echo "No history to commit"
          git add logs/ health_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update history and logs [skip ci]" || echo "Nothing to commit"
          fi
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

