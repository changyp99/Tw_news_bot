name: News Bot

on:
  schedule:
    # 每30分鐘執行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # 可以手動觸發

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 需要 fetch history 才能讀到 sent_history.json
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run news bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python broadcast.py
      
      - name: Commit updated history
        run: |
          git config --local user.email "news-bot@github.com"
          git config --local user.name "News Bot"
          git add sent_history.json 2>/dev/null || echo "No history file to commit"
          # 只有當有變更時才 commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update sent history [skip ci]" || echo "Commit failed or nothing to commit"
          fi
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
