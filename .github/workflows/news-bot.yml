name: News Bot (with Health Monitor)

on:
  schedule:
    # 每30分鐘執行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # 可以手動觸發

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run news bot (broadcast)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python broadcast.py
      
      - name: Quick health check (light)
        run: |
          python self_healer.py --light || echo "Health check failed"
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Commit updated history
        run: |
          git config --local user.email "news-bot@github.com"
          git config --local user.name "News Bot"
          git add sent_history.json 2>/dev/null || echo "No history to commit"
          git add logs/ health_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update history and logs [skip ci]" || echo "Nothing to commit"
          fi
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
